<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سباق الفرق بين مربعين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; overflow: hidden; touch-action: manipulation; direction: rtl; }
        .compact-card {
            width: 100%; max-width: 420px; background: white; border-radius: 2rem;
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.1); border: 1px solid #f1f5f9;
            display: flex; flex-direction: column; max-height: 96vh; overflow: hidden; position: relative;
        }
        .top-info-bar {
            background: #f8fafc; border-bottom: 1px solid #e2e8f0; padding: 8px 16px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: 800; color: #64748b;
        }
        .btn-touch { min-height: 50px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; border-radius: 1rem; font-weight: 800; cursor: pointer; }
        .btn-touch:active { transform: scale(0.97); }
        
        .leaderboard-modal { 
            position: absolute; inset: 0; background: #ffffff; z-index: 100; 
            display: flex; flex-direction: column; padding: 1.25rem; transition: all 0.3s; 
        }
        .hidden-modal { opacity: 0; pointer-events: none; transform: scale(0.95); display: none; }
        .visible-modal { opacity: 1; pointer-events: auto; transform: scale(1); display: flex; }
        
        .tab-btn { flex: 1; padding: 8px; font-size: 11px; font-weight: bold; border-radius: 8px; transition: 0.3s; border: 1px solid transparent; cursor: pointer; }
        .tab-active { background-color: #3b82f6; color: white; box-shadow: 0 2px 10px rgba(59, 130, 246, 0.4); }
        .tab-inactive { background-color: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
        
        .rank-row-me { background-color: #eff6ff !important; border-right: 4px solid #2563eb !important; }
        .sync-loader { font-size: 10px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .leaderboard-name { color: #1e293b; font-weight: 800; font-size: 11px; }
        .leaderboard-rank { font-weight: 900; }

        /* تنسيقات إضافية لخيارات اللعبة */
        .opt-btn {
            transition: all 0.2s ease;
            direction: rtl; 
        }
        .opt-btn:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen w-screen flex items-center justify-center p-3 text-right">

    <div class="compact-card">
        <!-- الشريط العلوي -->
        <div class="top-info-bar">
            <div class="flex items-center gap-2 overflow-hidden">
                <i class="fas fa-user-graduate text-blue-500"></i>
                <span id="top-student-name" class="truncate font-black"></span>
                <script>
                    (function() {
                        const p = new URLSearchParams(window.location.search);
                        const raw = p.get('name') || p.get('studentName') || p.get('username') || p.get('user');
                        const display = document.getElementById('top-student-name');
                        display.textContent = raw ? decodeURIComponent(raw) : "بطل التحدي";
                    })();
                </script>
            </div>
            <div class="flex items-center gap-2 bg-white px-2 py-0.5 rounded-full border shadow-sm font-bold">
                <span id="sync-icon" class="hidden"><i class="fas fa-sync sync-loader text-blue-400"></i></span>
                <i class="fas fa-star text-yellow-500 text-[10px]"></i>
                <span id="top-prev-score">٠ / ٥</span>
            </div>
        </div>

        <!-- الشاشة 1: البداية -->
        <div id="start-screen" class="p-6 text-center flex flex-col gap-4 h-full justify-center">
            <h1 class="text-xl font-black text-slate-800" id="game-main-title">سباق الفرق بين مربعين</h1>
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-[11px] font-bold text-blue-700 leading-relaxed text-center">
                أهلاً بك يا بطل! أجب عن أسئلة تحليل الفرق بين مربعين في أسرع وقت.
            </div>
            
            <!-- قانون الفرق بين مربعين للتذكير -->
            <div class="bg-indigo-50 p-3 rounded-2xl border border-indigo-100 text-center shadow-sm">
                <span class="text-[10px] font-bold text-indigo-400 mb-1 flex items-center justify-center gap-1"><i class="fas fa-lightbulb"></i> تذكر القاعدة:</span>
                <p class="text-xl font-black text-indigo-700 mt-1" dir="rtl" style="font-family: sans-serif;">أ² - ب² = (أ - ب)(أ + ب)</p>
            </div>
            
            <div class="flex flex-row gap-2 items-stretch mt-2">
                <button onclick="startGame()" class="btn-touch flex-[2.5] bg-blue-600 text-white shadow-lg text-lg">
                    بدء التحدي <i class="fas fa-play-circle mr-2"></i>
                </button>
                <button onclick="fetchAndShowLeaderboard(true)" class="btn-touch flex-1 bg-white text-slate-600 border border-slate-200 text-[10px] flex-col leading-tight py-2">
                    <i class="fas fa-trophy text-yellow-500 text-xl mb-1"></i>
                    <span>سجل الأبطال</span>
                </button>
            </div>
            
            <p class="text-[10px] text-slate-400 font-bold mt-2 tracking-widest uppercase text-center">أ. عبد العزيز خالد العبلان</p>
        </div>

        <!-- الشاشة 2: اللعبة -->
        <div id="game-screen" class="hidden p-5 flex flex-col h-full overflow-y-auto">
            
            <!-- حقول مخفية لتخزين القيم وتمريرها لدوال القالب الأصلية -->
            <input type="hidden" id="input-achieved" value="0">
            <input type="hidden" id="input-max" value="10">
            <input type="hidden" id="input-metric-value" value="0">

            <div class="flex-1 flex flex-col justify-center gap-4 w-full">
                <!-- عداد الأسئلة والوقت -->
                <div class="flex justify-between items-center px-2">
                    <span id="q-counter" class="text-[10px] font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">السؤال ١ / ٥</span>
                    <span id="live-timer" class="text-[12px] font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 flex items-center gap-1 transition-all duration-300">
                        <i class="fas fa-stopwatch"></i> <span id="timer-display" dir="ltr">٠٠:٠٠</span>
                    </span>
                </div>

                <!-- نص السؤال -->
                <div class="bg-white p-5 rounded-2xl border-2 border-blue-100 shadow-sm text-center min-h-[100px] flex items-center justify-center">
                    <h2 id="q-text" class="text-base font-black text-slate-700 leading-loose" dir="rtl">
                        <!-- يُحقن السؤال هنا -->
                    </h2>
                </div>

                <!-- خيارات الإجابة -->
                <div id="options-grid" class="grid grid-cols-2 gap-3 mt-2">
                    <button class="opt-btn bg-white border-2 border-slate-200 text-slate-700 font-bold text-sm py-4 px-2 rounded-xl text-center shadow-sm" onclick="checkAnswer(0)" id="opt-0"></button>
                    <button class="opt-btn bg-white border-2 border-slate-200 text-slate-700 font-bold text-sm py-4 px-2 rounded-xl text-center shadow-sm" onclick="checkAnswer(1)" id="opt-1"></button>
                    <button class="opt-btn bg-white border-2 border-slate-200 text-slate-700 font-bold text-sm py-4 px-2 rounded-xl text-center shadow-sm" onclick="checkAnswer(2)" id="opt-2"></button>
                    <button class="opt-btn bg-white border-2 border-slate-200 text-slate-700 font-bold text-sm py-4 px-2 rounded-xl text-center shadow-sm" onclick="checkAnswer(3)" id="opt-3"></button>
                </div>
            </div>
        </div>

        <!-- الشاشة 3: النتائج -->
        <div id="result-screen" class="hidden p-5 flex flex-col h-full overflow-hidden text-center justify-center">
            <div id="final-stats" class="grid grid-cols-3 gap-1 mb-4"></div>
            
            <div class="bg-green-50 p-4 rounded-2xl border border-green-100 mb-4">
                <i class="fas fa-check-double text-green-500 text-2xl mb-1"></i>
                <p id="save-msg" class="font-black text-green-800 text-sm">تم اعتماد نتيجتك بنجاح!</p>
            </div>
            <button onclick="fetchAndShowLeaderboard(true)" class="btn-touch w-full bg-blue-600 text-white mb-4 shadow-md">
                <i class="fas fa-crown ml-2"></i> سجل الأبطال
            </button>
            <div class="mt-auto flex gap-2">
                <button onclick="location.reload()" class="btn-touch flex-1 bg-slate-100 text-slate-600 text-sm font-bold">إعادة</button>
                <button id="finish-btn" class="btn-touch flex-[2] bg-slate-900 text-white text-sm font-bold">إنهاء</button>
            </div>
        </div>

        <!-- سجل الأبطال -->
        <div id="leaderboard-modal" class="leaderboard-modal hidden-modal" dir="rtl">
            <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                <h3 class="font-black text-slate-800 text-lg"><i class="fas fa-trophy text-yellow-500 ml-2"></i>سجل المتصدرين</h3>
                <button onclick="closeLeaderboardModal()" class="w-9 h-9 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center transition-all hover:bg-red-50 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex gap-2 mb-4">
                <button onclick="switchTab('class')" id="tab-class" class="tab-btn tab-inactive">أبطال فصلي</button>
                <button onclick="switchTab('global')" id="tab-global" class="tab-btn tab-active">أبطال اللعبة (الكل)</button>
            </div>
            <div id="modal-body" class="flex-1 overflow-y-auto bg-slate-50 rounded-2xl border border-slate-100 p-1 relative">
                <div id="modal-loader" class="absolute inset-0 flex items-center justify-center hidden bg-white/80 z-10"><div class="sync-loader text-blue-500 text-3xl"><i class="fas fa-sync"></i></div></div>
                <div id="leaderboard-content" class="space-y-1"></div>
            </div>
            <p class="text-center text-[9px] text-slate-400 mt-2 font-mono italic">الترتيب حسب الدرجة ثم الأفضلية</p>
        </div>
    </div>

    <script>
    // --- بنوك الأسئلة (12 سؤال أساسي مقسمة على 4 مستويات) ---
    const questionBanks = {
        // المستوى 1: سهل (فرق بين مربعين مباشر)
        level1: [
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>س² - ٩</span>",
                options: ["(س - ٣)(س - ٣)", "(س - ٣)(س + ٣)", "(س - ٩)(س + ١)", "(س + ٣)(س + ٣)"],
                correct: 1
            },
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>س² - ١٦</span>",
                options: ["(س - ٤)²", "(س + ٤)²", "(س - ٤)(س + ٤)", "(س - ٨)(س + ٢)"],
                correct: 2
            },
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>ص² - ٢٥</span>",
                options: ["(ص - ٥)(ص + ٥)", "(ص - ٢٥)(ص + ١)", "(ص - ٥)²", "لا يمكن تحليلها"],
                correct: 0
            }
        ],
        // المستوى 2: متوسط (تحليل فرق بين مربعين مع وجود معاملات)
        level2: [
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>٤أ² - ٢٥</span>",
                options: ["(٢أ - ٥)²", "(٢أ - ٥)(٢أ + ٥)", "(٤أ - ٥)(أ + ٥)", "(٢أ + ٥)²"],
                correct: 1
            },
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>٩س² - ١</span>",
                options: ["(٣س - ١)(٣س + ١)", "(٩س - ١)(س + ١)", "(٣س - ١)²", "(٣س + ١)²"],
                correct: 0
            },
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>١٦م² - ٩</span>",
                options: ["(٤م - ٣)²", "(١٦م - ٩)(م + ١)", "(٤م - ٣)(٤م + ٣)", "٤(م² - ٣)"],
                correct: 2
            }
        ],
        // المستوى 3: متوسط-صعب (استخراج قاسم مشترك ثم تحليل)
        level3: [
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>٥هـ³ - ٢٠هـ</span>",
                options: ["٥هـ(هـ² - ٤)", "٥(هـ³ - ٤هـ)", "٥هـ(هـ - ٢)(هـ + ٢)", "هـ(٥هـ² - ٢٠)"],
                correct: 2
            },
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>٣س³ - ٢٧س</span>",
                options: ["٣س(س - ٣)(س + ٣)", "٣س(س - ٩)(س + ١)", "٣س(س - ٣)²", "س(٣س² - ٢٧)"],
                correct: 0
            },
            {
                question: "حلل كثيرة الحدود التالية تحليلاً تاماً:<br><span class='text-xl text-blue-600 mt-2 block font-sans' dir='rtl'>٢ص³ - ٣٢ص</span>",
                options: ["٢ص(ص² - ١٦)", "(٢ص - ٤)(ص + ٨)", "٢ص(ص - ٤)²", "٢ص(ص - ٤)(ص + ٤)"],
                correct: 3
            }
        ],
        // المستوى 4: صعب (تجميع الحدود) - كل عنصر يحتوي على جزئين متسلسلين
        level4: [
            // النموذج الأول (الموجود مسبقاً)
            {
                part1: {
                    question: "<span class='text-2xl text-blue-600 mb-3 block font-sans font-bold' dir='rtl'>٣ن³ - ٧ن² - ٣ن + ٧</span><span class='text-sm text-slate-500 font-bold'>الخطوة الأولى من الحل (التجميع واستخراج العامل المشترك) هي:</span>",
                    options: ["(ن² - ١)(٣ن - ٧)", "(ن² + ١)(٣ن - ٧)", "(ن² - ١)(٣ن + ٧)", "ن²(٣ن - ٧) - ١"],
                    correct: 0
                },
                part2: {
                    question: "<span class='text-2xl text-blue-600 mb-3 block font-sans font-bold' dir='rtl'>(ن² - ١)(٣ن - ٧)</span><span class='text-sm text-slate-500 font-bold'>الخطوة التالية (التحليل التام) هي:</span>",
                    options: ["(ن - ١)²(٣ن - ٧)", "(ن + ١)²(٣ن - ٧)", "(ن - ١)(ن + ١)(٣ن - ٧)", "(ن² - ١)(٣ن - ٧)"],
                    correct: 2
                }
            },
            // النموذج الثاني
            {
                part1: {
                    question: "<span class='text-2xl text-blue-600 mb-3 block font-sans font-bold' dir='rtl'>٢س³ - ٥س² - ٨س + ٢٠</span><span class='text-sm text-slate-500 font-bold'>الخطوة الأولى من الحل (التجميع واستخراج العامل المشترك) هي:</span>",
                    options: ["(س² - ٤)(٢س + ٥)", "(س² - ٤)(٢س - ٥)", "(س² + ٤)(٢س - ٥)", "س²(٢س - ٥) - ٤"],
                    correct: 1
                },
                part2: {
                    question: "<span class='text-2xl text-blue-600 mb-3 block font-sans font-bold' dir='rtl'>(س² - ٤)(٢س - ٥)</span><span class='text-sm text-slate-500 font-bold'>الخطوة التالية (التحليل التام) هي:</span>",
                    options: ["(س - ٢)(س + ٢)(٢س - ٥)", "(س - ٢)²(٢س - ٥)", "(س + ٢)²(٢س - ٥)", "لا يمكن تحليله أكثر"],
                    correct: 0
                }
            },
            // النموذج الثالث
            {
                part1: {
                    question: "<span class='text-2xl text-blue-600 mb-3 block font-sans font-bold' dir='rtl'>٥ص³ - ٢ص² - ٤٥ص + ١٨</span><span class='text-sm text-slate-500 font-bold'>الخطوة الأولى من الحل (التجميع واستخراج العامل المشترك) هي:</span>",
                    options: ["(ص² - ٩)(٥ص - ٢)", "ص²(٥ص - ٢) - ٩", "(ص² - ٩)(٥ص + ٢)", "(ص² + ٩)(٥ص - ٢)"],
                    correct: 0
                },
                part2: {
                    question: "<span class='text-2xl text-blue-600 mb-3 block font-sans font-bold' dir='rtl'>(ص² - ٩)(٥ص - ٢)</span><span class='text-sm text-slate-500 font-bold'>الخطوة التالية (التحليل التام) هي:</span>",
                    options: ["(ص - ٣)²(٥ص - ٢)", "(ص² - ٩)(٥ص - ٢)", "(ص + ٣)²(٥ص - ٢)", "(ص - ٣)(ص + ٣)(٥ص - ٢)"],
                    correct: 3
                }
            }
        ]
    };

    // متغيرات اللعبة الأساسية
    let quizData = []; // سيتم تعبئتها ديناميكياً
    let currentQ = 0;
    let score = 0; // النقاط من 10
    let errorsCount = 0;
    let currentQuestionAttempts = 0; 
    let timerInterval;
    let elapsedSeconds = 0;
    let penaltySeconds = 0;

    // دالة لاختيار عنصر عشوائي من مصفوفة
    const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];

    // دالة تجهيز أسئلة اللعبة من البنوك
    function initializeQuiz() {
        quizData = [];
        // سحب سؤال عشوائي من كل مستوى للحفاظ على التدرج
        quizData.push(pickRandom(questionBanks.level1));
        quizData.push(pickRandom(questionBanks.level2));
        quizData.push(pickRandom(questionBanks.level3));
        
        // سحب نموذج عشوائي من المستوى الرابع وإضافة شقيه المتسلسلين
        const selectedLevel4 = pickRandom(questionBanks.level4);
        quizData.push(selectedLevel4.part1);
        quizData.push(selectedLevel4.part2);
    }

    // دالة تحديث وعرض الوقت
    function updateTimerDisplay() {
        const total = elapsedSeconds + penaltySeconds;
        const m = Math.floor(total / 60);
        const s = total % 60;
        const formatted = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        document.getElementById('timer-display').textContent = window.toAr ? window.toAr(formatted) : formatted;
    }

    // دالة تعطيل جميع الأزرار مؤقتاً
    function disableAllButtons() {
        for (let i = 0; i < 4; i++) document.getElementById(`opt-${i}`).disabled = true;
    }

    // الانتقال للسؤال التالي
    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) {
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    // دالة تحميل السؤال
    function loadQuestion() {
        const qData = quizData[currentQ];
        currentQuestionAttempts = 0; // تصفير المحاولات للسؤال الجديد
        document.getElementById('q-counter').textContent = `السؤال ${toAr(currentQ + 1)} / ${toAr(quizData.length)}`;
        document.getElementById('q-text').innerHTML = qData.question;
        
        for (let i = 0; i < 4; i++) {
            const btn = document.getElementById(`opt-${i}`);
            btn.innerHTML = qData.options[i];
            btn.disabled = false;
            // إعادة الألوان والشفافية للوضع الافتراضي
            btn.className = "opt-btn bg-white border-2 border-slate-200 text-slate-700 font-bold text-sm py-4 px-2 rounded-xl text-center shadow-sm opacity-100";
        }
    }

    // دالة فحص الإجابة مع نظام (الفرصة الثانية)
    window.checkAnswer = (selectedIndex) => {
        const qData = quizData[currentQ];
        const correctIndex = qData.correct;
        const selectedBtn = document.getElementById(`opt-${selectedIndex}`);
        const correctBtn = document.getElementById(`opt-${correctIndex}`);

        if (selectedIndex === correctIndex) {
            // إجابة صحيحة
            if (currentQuestionAttempts === 0) score += 2; // من أول محاولة
            else score += 1; // من ثاني محاولة

            disableAllButtons();
            selectedBtn.classList.remove('bg-white', 'border-slate-200', 'text-slate-700');
            selectedBtn.classList.add('bg-green-500', 'border-green-600', 'text-white', 'scale-105');
            
            setTimeout(nextQuestion, 1500);

        } else {
            // إجابة خاطئة
            currentQuestionAttempts++;
            errorsCount++;
            
            // إضافة عقوبة الوقت (10 ثواني)
            penaltySeconds += 10;
            updateTimerDisplay();
            
            // تأثير بصري للوقت عند الخطأ
            const timerEl = document.getElementById('live-timer');
            timerEl.classList.remove('text-blue-500', 'bg-blue-50', 'border-blue-100');
            timerEl.classList.add('text-red-600', 'bg-red-100', 'border-red-200', 'scale-110');
            setTimeout(() => {
                timerEl.classList.add('text-blue-500', 'bg-blue-50', 'border-blue-100');
                timerEl.classList.remove('text-red-600', 'bg-red-100', 'border-red-200', 'scale-110');
            }, 500);

            if (currentQuestionAttempts === 1) {
                // الخطأ الأول: إخفاء الخيار وإعطاء فرصة ثانية
                selectedBtn.classList.remove('bg-white', 'border-slate-200', 'text-slate-700');
                selectedBtn.classList.add('bg-red-50', 'border-red-200', 'text-red-300', 'opacity-50');
                selectedBtn.disabled = true; // تعطيل هذا الزر فقط
            } else {
                // الخطأ الثاني: صفر نقاط، إظهار الصحيح والانتقال
                disableAllButtons();
                selectedBtn.classList.remove('bg-white', 'border-slate-200', 'text-slate-700', 'bg-red-50', 'text-red-300');
                selectedBtn.classList.add('bg-red-500', 'border-red-600', 'text-white');
                
                correctBtn.classList.remove('bg-white', 'border-slate-200', 'text-slate-700');
                correctBtn.classList.add('bg-green-500', 'border-green-600', 'text-white');
                
                setTimeout(nextQuestion, 2000); // وقت أطول قليلاً لرؤية الإجابة الصحيحة
            }
        }
    };

    // إنهاء الاختبار وتعبئة الحقول للقالب الأصلي
    function finishQuiz() {
        clearInterval(timerInterval); // إيقاف العداد
        const finalTime = elapsedSeconds + penaltySeconds;
        
        // تم الاعتماد على الوقت كمعيار وحيد للمفاضلة
        const metricValue = finalTime;

        // تغذية الحقول المخفية
        document.getElementById('input-achieved').value = score;
        document.getElementById('input-max').value = quizData.length * 2; // أقصى حد 10
        document.getElementById('input-metric-value').value = metricValue;

        // استدعاء دالة القالب الأصلية لإكمال العملية وحفظ النتيجة
        processResults();
    }


    // --- الكود الأصلي للقالب ---
    (function() {
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqAQlGhNs8k5RwHs6jrWxDiDwaMABSx8a9Fl81O5oVVa5fHRWTwIEvsGy2cSDP4zGLWQ/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const GAME_ID = urlParams.get('gameId') || 'g7_5_1'; 
        const studentId = urlParams.get('studentId') || urlParams.get('userId');
        const classId = urlParams.get('classId');
        
        let studentName = decodeURIComponent(urlParams.get('name') || urlParams.get('studentName') || urlParams.get('username') || "بطل التحدي");
        window.currentMetricType = 'time'; // جعلناه عاماً
        let currentLeaderboardMode = classId ? 'class' : 'global';
        let localVisitorResult = null;

        window.toAr = (n) => String(n).replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('top-student-name').textContent = studentName;
            if (!classId) {
                document.getElementById('tab-class').style.display = 'none';
                currentLeaderboardMode = 'global';
            } else {
                document.getElementById('tab-class').className = 'tab-btn tab-active';
                document.getElementById('tab-global').className = 'tab-btn tab-inactive';
            }
            if (studentId && classId) {
                document.getElementById('sync-icon').classList.remove('hidden');
                fetchInitialCloudData();
            } else if (!urlParams.get('name')) {
                studentName = "بطل زائر";
                document.getElementById('top-student-name').textContent = studentName;
            }
            document.getElementById('finish-btn').onclick = () => window.parent.postMessage({ event: 'gameFinished', gameId: GAME_ID }, '*');
        });

        async function fetchInitialCloudData() {
            try {
                const url = `${SCRIPT_URL}?action=getStudentData&studentId=${studentId}&classId=${encodeURIComponent(classId)}&itemId=${GAME_ID}&t=${Date.now()}`;
                const res = await (await fetch(url)).json();
                if (res.status === 'success' && res.data) {
                    if (res.data.name) { studentName = res.data.name; document.getElementById('top-student-name').textContent = studentName; }
                    if (res.data.games && res.data.games[GAME_ID]) document.getElementById('top-prev-score').textContent = toAr(parseFloat(res.data.games[GAME_ID].grade).toFixed(1)) + " / ٥";
                } else if (!urlParams.get('name')) { studentName = "بطل زائر"; document.getElementById('top-student-name').textContent = studentName; }
            } catch (e) { console.log("Cloud Connect Failed"); }
            finally { document.getElementById('sync-icon').classList.add('hidden'); }
        }

        window.startGame = () => { 
            // سحب أسئلة الجلسة الحالية عشوائياً من البنوك
            initializeQuiz();
            currentQ = 0;
            score = 0;
            
            document.getElementById('start-screen').classList.add('hidden'); 
            document.getElementById('game-screen').classList.remove('hidden');
            
            // بدء العداد وتحميل أول سؤال
            elapsedSeconds = 0;
            penaltySeconds = 0;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                updateTimerDisplay();
            }, 1000);
            
            loadQuestion();
        };

        window.processResults = () => {
            const ach = parseFloat(document.getElementById('input-achieved').value);
            const max = parseFloat(document.getElementById('input-max').value);
            const met = parseFloat(document.getElementById('input-metric-value').value) || 0;
            if (isNaN(ach) || isNaN(max) || max <= 0) return;
            const grade = ((ach / max) * 5).toFixed(1);
            showResult(ach, max, grade, met);
            if (studentId && classId) saveScore(grade, met);
            else { localVisitorResult = { name: studentName, grade: grade, metric: met, isLocal: true }; fetchAndShowLeaderboard(false); }
        };

        function showResult(a, m, g, met) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-stats').innerHTML = `
                <div class="bg-blue-50 p-2 rounded-xl border border-blue-100 text-center flex flex-col justify-center">
                    <p class="text-[8px] font-bold text-blue-400 uppercase">النقاط</p>
                    <p class="text-[11px] font-black text-blue-900">${toAr(a)} / ${toAr(m)}</p>
                </div>
                <div class="bg-emerald-50 p-2 rounded-xl border border-emerald-100 text-center flex flex-col justify-center shadow-sm">
                    <p class="text-[8px] font-bold text-emerald-600 uppercase">الدرجة</p>
                    <p class="text-lg font-black text-emerald-900">${toAr(g)}</p>
                </div>
                <div class="bg-purple-50 p-2 rounded-xl border border-purple-100 text-center flex flex-col justify-center">
                    <p class="text-[8px] font-bold text-purple-400 uppercase">الوقت (ث)</p>
                    <p class="text-lg font-black text-purple-900">${toAr(met)}</p>
                </div>
            `;
        }

        async function saveScore(g, met) {
            const p = new URLSearchParams({ action: 'saveScore', studentId, classId, itemId: GAME_ID, score: g, metricValue: met, type: 'game' });
            try { await fetch(`${SCRIPT_URL}?${p.toString()}`); } finally { fetchAndShowLeaderboard(false); }
        }

        window.fetchAndShowLeaderboard = function(isManual = false) {
            const modal = document.getElementById('leaderboard-modal');
            if (isManual) { modal.classList.remove('hidden-modal'); modal.classList.add('visible-modal'); }
            const content = document.getElementById('leaderboard-content');
            document.getElementById('modal-loader').classList.remove('hidden');
            let reqClassId = (currentLeaderboardMode === 'class') ? classId : 'all';
            const url = `${SCRIPT_URL}?action=getLeaderboard&gameId=${GAME_ID}&classId=${encodeURIComponent(reqClassId || 'all')}&t=${Date.now()}`;
            fetch(url).then(r => r.json()).then(res => {
                let data = (res.status === 'success' && res.data) ? res.data : [];
                if (localVisitorResult && (currentLeaderboardMode === 'global' || !classId)) {
                    if (!data.find(p => p.name === localVisitorResult.name)) data.push(localVisitorResult);
                    data.sort((a, b) => parseFloat(b.grade) - parseFloat(a.grade) || parseFloat(a.metric) - parseFloat(b.metric));
                }
                if (data.length > 0) {
                    let h = `<table class="w-full text-right text-[10px] border-collapse"><thead class="text-slate-400 border-b border-slate-100 bg-slate-50/50"><tr><th class="p-2 text-center">#</th><th class="p-2 text-right">البطل</th><th class="p-2 text-center text-emerald-600">الدرجة</th></tr></thead><tbody class="divide-y divide-slate-50">`;
                    data.forEach((p, i) => {
                        const isMe = (p.isLocal || (studentId && String(p.name).trim() === String(studentName).trim()));
                        h += `<tr class="${isMe ? 'rank-row-me' : 'hover:bg-slate-50/50'} transition-colors">
                            <td class="p-2 leaderboard-rank text-center ${i<3 ? 'text-yellow-500 text-sm' : 'text-slate-400'}">${i < 3 ? ['🥇','🥈','🥉'][i] : toAr(i+1)}</td>
                            <td class="p-2 leaderboard-name ${isMe ? 'text-blue-700 font-extrabold' : 'text-slate-700'}">${p.name} ${isMe ? '<span class="bg-blue-600 text-white text-[7px] px-1 rounded-full mx-1">أنت</span>' : ''}</td>
                            <td class="p-2 text-center"><span class="text-emerald-600 font-black">${toAr(parseFloat(p.grade).toFixed(1))}</span> <span class="text-[8px] text-slate-400 block font-bold">(${toAr(p.metric || p.metricValue || 0)})</span></td>
                        </tr>`;
                    });
                    content.innerHTML = h + `</tbody></table>`;
                } else content.innerHTML = `<div class="py-10 text-center text-slate-400 text-xs italic font-bold">بانتظار تسجيل الأبطال..</div>`;
            }).finally(() => document.getElementById('modal-loader').classList.add('hidden'));
        };

        window.switchTab = (mode) => { currentLeaderboardMode = mode; document.getElementById('tab-class').className = mode === 'class' ? 'tab-btn tab-active' : 'tab-btn tab-inactive'; document.getElementById('tab-global').className = mode === 'global' ? 'tab-btn tab-active' : 'tab-btn tab-inactive'; fetchAndShowLeaderboard(false); };
        window.closeLeaderboardModal = () => document.getElementById('leaderboard-modal').classList.replace('visible-modal', 'hidden-modal');
    })();
    </script>
</body>
</html>
